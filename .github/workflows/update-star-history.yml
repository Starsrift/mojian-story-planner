name: Update Star History

on:
  push:
    branches: [main]
    paths:
      - scripts/update-star-history.mjs
      - .github/workflows/update-star-history.yml
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star-history
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate star history chart
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-star-history.mjs

      - name: Commit updated chart
        run: |
          if git diff --quiet -- assets/star-history.svg; then
            echo "Star chart is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/star-history.svg
          git commit -m "docs: update star history"
          git push
