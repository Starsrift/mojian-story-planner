name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '必须与应用版本一致，例如 v0.1.0'
        required: true
        default: 'v0.1.0'
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
          - label: macOS Intel
            platform: macos-latest
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles dmg
          - label: Windows x64
            platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis

    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify release tag and application versions
        run: node scripts/verify-release-version.mjs

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Build installers and update draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 墨笺 ${{ env.RELEASE_TAG }}
          releaseBody: |
            墨笺桌面版测试发布。

            请从 Assets 下载与你的系统匹配的安装包：
            - Apple Silicon Mac：aarch64 DMG
            - Intel Mac：x64 DMG
            - Windows 10/11 x64：NSIS setup.exe
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
